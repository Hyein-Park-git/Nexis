# =================  Nexis Agent Configuration  =================

# ---------------------------------------------------------------
# Server Connection
# The IP address and TCP port of the Nexis Server to report to.
# ---------------------------------------------------------------
server.host=127.0.0.1
server.port=9000

# ---------------------------------------------------------------
# Collection Interval
# How often (in seconds) the agent collects and sends metrics.
# Minimum recommended: 10
# ---------------------------------------------------------------
interval=30

# ---------------------------------------------------------------
# Agent Identity
# A custom name for this agent/machine.
# If left blank, the system hostname will be used automatically.
# ---------------------------------------------------------------
agent.name=

# ---------------------------------------------------------------
# Log Directory
# Directory where agent log files will be stored.
# Set automatically by the installer. Change with caution.
# ---------------------------------------------------------------
log.dir=