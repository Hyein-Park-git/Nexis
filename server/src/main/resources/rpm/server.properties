# =================  Nexis Server Configuration  =================

# ---------------------------------------------------------------
# Server
# server.host : IP address the TCP server listens on
# server.port : TCP port for receiving agent metrics
# ---------------------------------------------------------------
server.host=0.0.0.0
server.port=9000

# ---------------------------------------------------------------
# Database
# db.type options: mariadb / mysql / postgresql
# db.host     : database server hostname or IP
# db.port     : database server port
#               (mysql/mariadb default: 3306, postgresql default: 5432)
# db.name     : database (schema) name
# db.username : database user
# db.password : database password
# ---------------------------------------------------------------
db.type=
db.host=
db.port=
db.name=
db.username=
db.password=

# ---------------------------------------------------------------
# DDL Auto
# Controls how Hibernate manages the schema on startup.
# none        : do nothing (recommended for production)
# validate    : validate schema, throw error if mismatch
# update      : create missing tables/columns automatically
# create      : drop and recreate schema on every startup
# create-drop : same as create, also drops on shutdown
# ---------------------------------------------------------------
jpa.ddl-auto=update

# ---------------------------------------------------------------
# Log Directory
# Directory where server log files will be stored.
# Use absolute path. Set automatically by the installer.
# Change with caution - the lock file is placed in the parent directory.
# Example: log.dir=/var/log/nexis-server/logs
#          lock file -> /var/log/nexis-server/nexis-server.lock
# ---------------------------------------------------------------
log.dir=/var/log/nexis-server/logs